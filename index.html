<style>
  :root{

  }

  html,body{margin:0;padding:0}

  }
  .wrap{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:20px 22px 90px}
  .serif{font-family:"Noto Serif KR",serif}
  .langbar{display:flex;justify-content:flex-end;gap:6px;margin-bottom:14px}
  .langbtn{font-family:"Noto Serif KR",serif;font-size:12.5px;cursor:pointer;background:transparent;border:1.4px solid var(--line);color:var(--ink-soft);border-radius:99px;padding:5px 13px;transition:all .15s}
  .langbtn.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .kicker{font-family:"Noto Serif KR",serif;letter-spacing:.32em;font-size:12px;color:var(--ochre);text-transform:uppercase;font-weight:600}
  h1{font-family:"Fraunces","Noto Serif KR",serif;font-weight:900;font-size:clamp(34px,7vw,58px);line-height:1.08;margin:.18em 0 .12em;letter-spacing:-.01em}
  h1 .em{color:var(--ochre)}
  .sub{color:var(--ink-soft);font-size:16px;max-width:60ch}
  .rule{height:2px;background:linear-gradient(90deg,var(--ochre),transparent);margin:26px 0;border:0}
  .card{background:linear-gradient(180deg, rgba(255,255,255,.35), rgba(255,255,255,.06));border:1px solid var(--line);border-radius:4px;padding:22px 24px;box-shadow:0 1px 0 rgba(255,255,255,.4) inset, 0 8px 30px -18px var(--shadow)}

  .axes-list li{padding:7px 0;border-bottom:1px dashed var(--line);display:flex;gap:10px;align-items:baseline}
  .axes-list li:last-child{border-bottom:0}
  .axes-list .L{color:var(--crimson);font-weight:700} .axes-list .R{color:var(--indigo);font-weight:700}
  .axes-list .vs{color:var(--ink-soft);font-size:12px}
  .meta{display:flex;flex-wrap:wrap;gap:10px 26px;margin:22px 0 8px;font-size:13.5px;color:var(--ink-soft)}
  .meta b{color:var(--ink);font-weight:700}
  .btn{font-family:"Noto Serif KR",serif;font-weight:600;cursor:pointer;background:var(--ink);color:var(--paper);border:0;border-radius:3px;padding:14px 28px;font-size:17px;letter-spacing:.02em;transition:transform .15s ease, box-shadow .15s ease;box-shadow:0 6px 18px -8px var(--shadow)}

  .btn.ochre{background:var(--ochre)}
  .note{font-size:12.5px;color:var(--ink-soft);margin-top:14px;max-width:62ch}

  .progress-bar{height:100%;width:0;background:linear-gradient(90deg,var(--ochre),var(--ochre-bright));transition:width .35s ease}

  .qtext{font-family:"Noto Serif KR",serif;font-weight:600;font-size:clamp(20px,4.4vw,26px);line-height:1.55;margin:6px 0 18px}

  .lk.agree{color:var(--indigo)} .lk.disagree{color:var(--crimson)} .lk.neutral{color:var(--ink-soft)}
  .lk.sel{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .lk.sel .dot{background:var(--paper);border-color:var(--paper)}
  .navrow{display:flex;justify-content:space-between;margin-top:22px}
  .link-btn{background:none;border:0;color:var(--ink-soft);cursor:pointer;font-size:14px;text-decoration:underline;font-family:inherit;padding:8px 4px}
  .link-btn[disabled]{opacity:.3;cursor:default;text-decoration:none}
  .reveal{opacity:0;transform:translateY(14px);animation:rise .6s ease forwards}
  @keyframes rise{to{opacity:1;transform:none}}
  .type-badge{text-align:center;padding:8px 0 4px}

  .type-name{font-family:"Fraunces","Noto Serif KR",serif;font-weight:900;font-size:clamp(27px,6.2vw,42px);line-height:1.14;margin:.16em 0;color:var(--ink)}

  .axis .labels .l{color:var(--crimson)} .axis .labels .r{color:var(--indigo)}
  .axis .pcts{display:flex;justify-content:space-between;font-size:11.5px;color:var(--ink-soft);margin-bottom:3px}
  .bar{height:18px;border-radius:3px;background:var(--paper-deep);overflow:hidden;display:flex;border:1px solid var(--line)}

  .bar .pos{background:linear-gradient(90deg,var(--indigo),#5663b8);height:100%;width:0;margin-left:auto;transition:width .9s cubic-bezier(.2,.8,.2,1)}
  .axis .gloss{font-size:12.5px;color:var(--ink-soft);margin-top:5px}
  .phil{display:flex;gap:14px;align-items:flex-start;padding:14px 0;border-bottom:1px dashed var(--line)}
  .phil .rank{font-family:"Fraunces",serif;font-weight:900;font-size:26px;color:var(--ochre);width:30px;flex:0 0 auto;text-align:center;line-height:1}
  .phil .who{font-family:"Noto Serif KR",serif;font-weight:600;font-size:18px}
  .phil .sim{font-size:12.5px;color:var(--teal);font-weight:700}
  .phil .blurb{font-size:13.5px;color:var(--ink-soft);margin-top:3px}
  .calib{background:rgba(58,65,122,.07);border-left:3px solid var(--indigo);padding:13px 16px;font-size:13.5px;border-radius:0 3px 3px 0;margin-top:8px}
  .shared{background:rgba(176,106,44,.09);border-left:3px solid var(--ochre);padding:13px 16px;font-size:13.5px;border-radius:0 3px 3px 0;margin-top:22px}
  details.appendix{margin-top:16px;border:1px solid var(--line);border-radius:3px;background:rgba(255,255,255,.2)}
  details.appendix summary{cursor:pointer;padding:13px 16px;font-family:"Noto Serif KR",serif;font-weight:600;list-style:none}
  details.appendix summary::-webkit-details-marker{display:none}
  details.appendix summary::before{content:"▸ ";color:var(--ochre)}
  details.appendix[open] summary::before{content:"▾ "}
  .appendix .disc{padding:0 16px 6px;font-size:12px;color:var(--ink-soft);font-style:italic}
  .src-item{padding:11px 16px;border-top:1px dashed var(--line);font-size:13px}
  .src-item .q{color:var(--ink)} .src-item .s{color:var(--ochre);font-weight:600;display:block;margin-top:3px;font-size:12px}
  .src-item .ans{float:right;font-size:11px;font-weight:700;padding:1px 7px;border-radius:99px;margin-left:8px}
  .ans-a{background:rgba(58,65,122,.15);color:var(--indigo)} .ans-d{background:rgba(141,47,58,.15);color:var(--crimson)} .ans-n{background:var(--paper-deep);color:var(--ink-soft)}
  .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:28px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--paper);padding:11px 20px;border-radius:4px;font-size:14px;opacity:0;transition:all .3s;z-index:9}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .foot{margin-top:46px;font-size:12px;color:var(--ink-soft);text-align:center;line-height:1.6}
  .hidden{display:none!important}
</style>

 method:   {neg:{ko:"정해진 방법 없음",en:"No fixed method"}, pos:{ko:"방법 규칙주의",en:"Rule-governed method"}, gloss:{ko:"모든 경우에 통하는 단 하나의 과학 방법이 있는가",en:"Is there one scientific method that works in every case?"}},
 plurality:{neg:{ko:"다원주의",en:"Pluralism"}, pos:{ko:"하나로 통합",en:"Monism"}, gloss:{ko:"세상에 대한 단 하나의 통합된 설명이 있는가, 분야마다 다른 조각보인가",en:"Is there one unified account of the world, or a patchwork that differs by field?"}},
 practice: {neg:{ko:"실험·해보기 중심",en:"Experiment-centered"}, pos:{ko:"이론 중심",en:"Theory-centered"}, gloss:{ko:"이론·표현이 먼저인가, 직접 해보고 만지는 실험·실천이 먼저인가",en:"Does theory come first, or hands-on experiment and practice?"}},
 values:   {neg:{ko:"가치가 섞임",en:"Value-laden"}, pos:{ko:"가치와 무관",en:"Value-free"}, gloss:{ko:"좋은 과학은 가치와 무관해야 하는가, 가치는 어차피 끼어드는가",en:"Should good science be free of values, or do values inevitably enter?"}},
};
const AXIS_KEYS=Object.keys(AXES);

/* ===================== QUESTIONS (plain language) ===================== */
const Q=[
 {t:{ko:`전자나 유전자처럼 눈에 안 보이는 것도, 그걸 가정한 이론이 그렇게 잘 들어맞는 걸 보면 진짜로 존재한다고 보는 게 자연스럽다.`,en:`Unseen things like electrons or genes probably really exist — otherwise it'd be a strange fluke that theories assuming them work so well.`}, src:{ko:["퍼트넘·보이드","‘기적은 없다’ 논증"],en:["Putnam & Boyd","No-Miracles Argument"]}, eff:{realism:2}},
 {t:{ko:`이론이 눈에 보이는 결과를 다 맞혀도, 그 뒤에 있다는 전자나 원자 같은 게 정말로 그렇게 존재하는지까지 ‘참’인 것은 아니다. 눈에 보이는 현상만 잘 설명하면 충분하고, 그 너머가 진짜인지까지 믿을 필요는 없다.`,en:`Even if a theory gets every observable result right, that doesn't make it "true" that the electrons or atoms it posits behind them really exist that way. Fitting what we can see is enough; we needn't believe the rest is real.`}, src:{ko:["반 프라센","구성적 경험론"],en:["van Fraassen","Constructive Empiricism"]}, eff:{realism:-2}},
 {t:{ko:`예전엔 옳다고 믿었지만 지금은 틀린 걸로 밝혀진 이론이 많다. 그러니 지금 잘 맞는 이론도 언젠가 틀렸다고 밝혀질 수 있다.`,en:`Lots of theories people once trusted turned out wrong. So today's best theories could turn out wrong too.`}, src:{ko:["라우든","비관적 메타귀납"],en:["Laudan","Pessimistic Meta-Induction"]}, eff:{realism:-2,progress:-1}},
 {t:{ko:`이론이 통째로 맞진 않더라도, 그 안의 수학적 뼈대(관계의 패턴)는 다음 이론에도 살아남는다. 그 부분만큼은 실제 세계를 반영한다.`,en:`Even if a theory isn't right as a whole, its mathematical skeleton — the pattern of relationships — survives into the next theory. At least that part reflects the real world.`}, src:{ko:["워럴","구조적 실재론"],en:["Worrall","Structural Realism"]}, eff:{realism:1,truth:1}},
 {t:{ko:`'눈에 보이느냐'는 그냥 우리 눈의 한계일 뿐이다. 전자는 탁자만큼이나 실제로 있는 것이다.`,en:`"Can we see it?" is just a limit of our eyes. An electron is every bit as real as a table.`}, src:{ko:["그로버 맥스웰","관측불가능성 비판"],en:["Grover Maxwell","Critique of (Un)observability"]}, eff:{realism:2}},
 {t:{ko:`우리 설명이 늘 조금씩 고쳐지더라도, 잘 나가는 과학은 세상이 실제로 어떻게 굴러가는지를 점점 더 정확히 보여준다.`,en:`Our descriptions keep getting tweaked, but good science shows ever more accurately how the world actually works.`}, src:{ko:["실로스","과학적 실재론"],en:["Psillos","Scientific Realism"]}, eff:{realism:1,progress:1}},
 {t:{ko:`'참'이란 실제 세상과 들어맞는다는 뜻이다. 그게 우리한테 쓸모 있든 없든, 사실이면 참이다.`,en:`"True" means matching the way the world actually is — whether or not it happens to be useful to us.`}, src:{ko:["대응설 전통","러셀 등"],en:["Correspondence tradition","Russell et al."]}, eff:{truth:2}},
 {t:{ko:`어떤 생각이 '맞다'는 건, 실제로 써먹어 보니 잘 통하더라는 뜻이다. 진리는 쓸모 속에서 만들어진다.`,en:`An idea being "true" just means it works well when you actually use it. Truth is made in usefulness.`}, src:{ko:["윌리엄 제임스","실용주의 진리관"],en:["William James","Pragmatist Theory of Truth"]}, eff:{truth:-2}},
 {t:{ko:`어떤 규칙은 맞다/틀리다의 문제가 아니라, 우리가 편해서 그렇게 쓰기로 정한 약속일 뿐이다(예: 측정 기준, 도형의 기본 규칙).`,en:`Some rules aren't true or false — we just agreed to use them because they're convenient (think measurement standards, or the ground rules of geometry).`}, src:{ko:["푸앵카레","규약주의"],en:["Poincaré","Conventionalism"]}, eff:{truth:-2,realism:-1}},
 {t:{ko:`'물은 H₂O다' 같은 것조차 정답이 딱 하나만 있는 게 아니다. 보는 방식·다루는 방식이 다르면 저마다 말이 되는 답이 여럿일 수 있다.`,en:`Even "water is H₂O" doesn't have just one right answer. Depending on how you approach and use it, several answers can each make sense.`}, src:{ko:["장하석","Is Water H2O?"],en:["Hasok Chang","Is Water H2O?"]}, eff:{truth:-2,plurality:-2}},
 {t:{ko:`충분히 오래 끝까지 탐구하면 결국 모두가 같은 결론에 이르게 되어 있고, 바로 그 결론이 '진짜'다.`,en:`If inquiry goes on long enough, everyone is bound to reach the same conclusion in the end — and that conclusion is what's real.`}, src:{ko:["퍼스","수렴적 실용주의"],en:["Peirce","Convergent Pragmatism"]}, eff:{truth:-1,progress:1}},
 {t:{ko:`이론이 좋은지는 세상을 거울처럼 똑같이 비추는지가 아니라, 우리가 뭔가를 해낼 수 있게 해주는지로 따져야 한다.`,en:`What makes a theory good isn't whether it mirrors the world, but whether it lets us get things done.`}, src:{ko:["듀이","도구주의"],en:["Dewey","Instrumentalism"]}, eff:{truth:-1,practice:-1}},
 {t:{ko:`과학은 틀린 걸 걸러내면서 진리에 점점 다가간다. 틀린 이론이 더 나은 이론으로 교체되는 게 곧 발전이다.`,en:`Science gets closer to the truth by weeding out errors. Progress is replacing a wrong theory with a better one.`}, src:{ko:["포퍼","진리유사도"],en:["Popper","Verisimilitude"]}, eff:{progress:2,method:1}},
 {t:{ko:`과학에 큰 전환이 일어나면 그 전후의 과학자들은 사실상 다른 세계를 보는 셈이라, 어느 쪽이 더 낫다고 딱 잘라 비교하기 어렵다.`,en:`After a big shift in science, the scientists before and after are practically seeing different worlds, so you can't cleanly say which side is better.`}, src:{ko:["쿤","공약불가능성"],en:["Kuhn","Incommensurability"]}, eff:{progress:-2,practice:-1}},
 {t:{ko:`발전이란 진리에 가까워지는 게 아니라, 우리가 다룰 수 있는 일과 할 수 있는 것이 점점 많아지는 것이다.`,en:`Progress isn't getting closer to truth — it's being able to handle and do more and more.`}, src:{ko:["장하석","실천적 진보관"],en:["Hasok Chang","Progress-as-Practice"]}, eff:{progress:-2,truth:-1}},
 {t:{ko:`과학이 뒤집힐 때도 틀린 부분만 버려지고, 맞는 핵심은 차곡차곡 쌓여 다음 세대로 이어진다.`,en:`When science is overturned, only the wrong parts are dropped; the correct core piles up and carries on to the next generation.`}, src:{ko:["누적주의 전통","—"],en:["Cumulativist tradition","—"]}, eff:{progress:1}},
 {t:{ko:`어떤 연구 흐름이 '잘 나가는 중'인지 '한물간' 건지는, 새로운 걸 예측해내는지 아니면 자꾸 변명만 붙이는지를 나중에 돌아봐야 알 수 있다.`,en:`Whether a line of research is "on a roll" or "running out of steam" can only be judged in hindsight — does it predict new things, or just keep making excuses?`}, src:{ko:["라카토시","연구 프로그램 방법론"],en:["Lakatos","Methodology of Research Programmes"]}, eff:{progress:1,method:1}},
 {t:{ko:`어떤 이론을 고를지는 데이터가 자동으로 정해주지 않는다. 정확성·단순성 같은 여러 기준을 저울질하는 거라, 똑똑한 사람들끼리도 선택이 갈릴 수 있다.`,en:`The data don't automatically pick which theory to choose. You weigh things like accuracy and simplicity, so even smart people can land on different choices.`}, src:{ko:["쿤","가치에 의한 이론선택"],en:["Kuhn","Values in Theory Choice"]}, eff:{progress:-1,method:-1,values:-1}},
 {t:{ko:`과학과 비과학을 가르는 기준은 ‘이런 결과가 나오면 내가 틀린 것’이라고 말할 수 있는지이다.`,en:`What separates science from non-science is whether you can say, "if this result comes up, I was wrong."`}, src:{ko:["포퍼","반증주의·구획"],en:["Popper","Falsificationism & Demarcation"]}, eff:{method:2,realism:1}},
 {t:{ko:`역사를 보면 큰 도약은 대부분 '정해진 방법'을 어겼을 때 나왔다. 모든 경우에 통하는 단 하나의 과학 방법 같은 건 없다.`,en:`Historically, the big leaps usually came from breaking "the proper method." There's no single scientific method that works in every case.`}, src:{ko:["파이어아벤트","인식적 무정부주의"],en:["Feyerabend","Epistemological Anarchism"]}, eff:{method:-2,plurality:-1}},
 {t:{ko:`과학이 강한 이유는, 무슨 논쟁이든 결국 '실험으로 확인하자'는 한 가지 원칙을 거의 고집스러울 만큼 지키기 때문이다.`,en:`Science is powerful because, whatever the dispute, it sticks almost stubbornly to one rule: settle it by experiment.`}, src:{ko:["스트래븐스","The Knowledge Machine"],en:["Strevens","The Knowledge Machine"]}, eff:{method:2}},
 {t:{ko:`과학 실력의 상당 부분은 말로 다 옮길 수 없는, 직접 해보며 몸으로 익히는 감각이다.`,en:`A lot of scientific skill is a feel you pick up by doing, not something you can fully write down as rules.`}, src:{ko:["폴라니","암묵지"],en:["Polanyi","Tacit Knowledge"]}, eff:{method:-1,practice:-1}},
 {t:{ko:`실험 결과가 예상과 다를 때, 정확히 어디가 틀렸는지는 논리만으로 정해지지 않는다. 고칠 수 있는 곳은 늘 여러 군데다.`,en:`When an experiment doesn't match expectations, logic alone can't pin down exactly what went wrong — there are always several things you could fix.`}, src:{ko:["뒤엠–콰인","검증의 전체론"],en:["Duhem–Quine","Confirmation Holism"]}, eff:{method:-1}},
 {t:{ko:`우리는 무엇을 보든 이미 가진 생각에 영향을 받는다. 아무 입장 없이 순수하게 '있는 그대로' 관찰하는 건 불가능하다.`,en:`Whatever we look at, our existing ideas color it. There's no way to observe things "purely," with no point of view.`}, src:{ko:["핸슨·쿤","관찰의 이론적재성"],en:["Hanson & Kuhn","Theory-ladenness of Observation"]}, eff:{method:-1,realism:-1}},
 {t:{ko:`결국 모든 과학은 물리학으로 환원되고, 세상에 대한 완벽하고 통일된 단 하나의 설명이 원리상 가능하다.`,en:`In the end all sciences boil down to physics, and in principle there's one complete, unified description of everything.`}, src:{ko:["통일과학·환원주의","—"],en:["Unity of Science","Reductionism"]}, eff:{plurality:2}},
 {t:{ko:`물리학의 '근본 법칙'조차 딱 들어맞는 건 잘 통제된 실험 안에서뿐이다. 실제 세상은 여기저기 다른 규칙이 적용되는 조각보에 가깝다.`,en:`Even physics' "fundamental laws" only hold exactly inside tidy lab setups. The real world is more like a patchwork where different rules apply in different places.`}, src:{ko:["카트라이트","The Dappled World"],en:["Cartwright","The Dappled World"]}, eff:{plurality:-2,practice:-1}},
 {t:{ko:`생물의 세계는 원래 들쭉날쭉해서 하나의 깔끔한 분류나 법칙으로 정리되지 않는다. 여러 갈래로 보는 게 임시방편이 아니라 사실 그 자체다.`,en:`The living world is inherently messy and won't fit one neat classification or law. Seeing it in many ways isn't a stopgap — it's just how things are.`}, src:{ko:["뒤프레","The Disorder of Things"],en:["Dupré","The Disorder of Things"]}, eff:{plurality:-2}},
 {t:{ko:`서로 안 맞아 보이는 여러 접근을 동시에 키워두는 건 낭비가 아니라, 오히려 과학을 건강하게 만든다.`,en:`Keeping several seemingly clashing approaches alive at once isn't waste — it actually keeps science healthy.`}, src:{ko:["장하석","능동적·규범적 다원주의"],en:["Hasok Chang","Active Normative Pluralism"]}, eff:{plurality:-2,method:-1}},
 {t:{ko:`분야마다 쓰는 법칙과 개념은 하나의 위계로 깔끔히 줄 세워지지 않고 느슨하게만 연결된다. 각 분야는 나름의 독립성을 갖는다.`,en:`Each field's laws and concepts aren't neatly stacked into one hierarchy; they're only loosely linked, and each field keeps its own independence.`}, src:{ko:["포더","특수과학론"],en:["Fodor","Special Sciences"]}, eff:{plurality:-1}},
 {t:{ko:`잘 자리잡은 과학은 자연을 '원래 나뉘는 결'대로 가른다. 올바른 분류는 우리가 지어내는 게 아니라 발견하는 것이다.`,en:`Well-established science cuts nature along its natural seams. The right classification is discovered, not invented.`}, src:{ko:["자연종 실재론","—"],en:["Natural-Kind Realism","—"]}, eff:{plurality:1,realism:1}},
 {t:{ko:`어떤 대상을 직접 다뤄서 다른 일을 일으킬 수 있다면 — 전자를 '쏘아' 다른 걸 바꿀 수 있다면 — 그건 실제로 있는 것이다. 실재의 기준은 '써먹을 수 있느냐'다.`,en:`If you can handle something to make other things happen — if you can "fire" electrons to change something — then it's real. The test of reality is whether you can put it to work.`}, src:{ko:["해킹","실험적 실재론"],en:["Hacking","Entity Realism"]}, eff:{practice:-2,realism:1}},
 {t:{ko:`실험은 이론을 검사하는 보조 역할인 것만은 아니다. 실험은 그 자체로 독립적인 활동이고 이론과 따로 발전한다.`,en:`Experiment isn't just a helper for testing theory. It's its own activity and moves forward on its own.`}, src:{ko:["해킹","Representing and Intervening"],en:["Hacking","Representing and Intervening"]}, eff:{practice:-2}},
 {t:{ko:`과학 지식의 기본 단위는 '문장'이 아니라 '실제로 해내는 활동의 묶음'이다. 앎은 그 활동 안에서 비로소 뜻을 갖는다.`,en:`The basic unit of scientific knowledge isn't a sentence but a bundle of things you can actually do. Knowing gets its meaning inside that doing.`}, src:{ko:["장하석","실천 중심 인식론"],en:["Hasok Chang","Practice-based Epistemology"]}, eff:{practice:-2,truth:-1}},
 {t:{ko:`과학 이론은 문장들의 모음이라기보다, 현상을 본떠 만든 '모형'들의 모음으로 보는 게 낫다.`,en:`A scientific theory is better seen as a set of "models" built to mimic phenomena than as a set of sentences.`}, src:{ko:["의미론적(모형) 견해","수페스·반 프라센"],en:["Semantic (Model) View","Suppes & van Fraassen"]}, eff:{practice:2}},
 {t:{ko:`데이터는 그냥 '주어지는' 게 아니다. 모으고 다듬고 옮기는 손질 과정을 거치며, 그 과정 자체가 이미 과학적 판단의 일부다.`,en:`Data aren't simply "given." They're collected, cleaned, and moved, and that handling is already part of the scientific reasoning.`}, src:{ko:["레오넬리","데이터 중심 과학철학"],en:["Leonelli","Data-centric Philosophy of Science"]}, eff:{practice:-1,values:-1}},
 {t:{ko:`과학적 사실은 실험실의 장비·사람·관계 속에서 '만들어진다'. 잘 정리된 사실은 그 환경의 산물이다.`,en:`Scientific facts are "built" within the lab's equipment, people, and relationships. A tidy fact is a product of that setting.`}, src:{ko:["라투르–울가","실험실 연구"],en:["Latour–Woolgar","Laboratory Studies"]}, eff:{practice:-2,realism:-1}},
 {t:{ko:`과학의 핵심(가설을 받아들일지 말지)은 사회적·윤리적 가치에서 자유로워야 한다. 가치는 주제를 고르거나 응용할 때만 끼어들어야 한다.`,en:`Science's core — accepting or rejecting a hypothesis — should be free of social and ethical values. Values belong only in choosing topics or applying results.`}, src:{ko:["가치무관 이상","고전 실증주의"],en:["Value-free Ideal","Classical Positivism"]}, eff:{values:2}},
 {t:{ko:`어떤 주장을 ‘받아들일 만큼 증거가 충분한가’를 정하는 일에는 정답이 되는 기준이 없다. 기준을 낮추면 틀린 걸 맞다고 할 위험(거짓 양성), 높이면 맞는 걸 놓칠 위험(거짓 음성)이 커진다. 둘 중 어느 쪽이 큰지는 가치의 문제이기 때문에 ‘얼마나 확실해야 확실한 것이냐’는 윤리·사회적 판단이다.`,en:`There's no objectively right cutoff for "how much evidence is enough" to accept a claim. Set the bar low and you risk calling a false thing true (a false positive); set it high and you risk missing a true thing (a false negative). Which error is worse is a question of values — so "how sure counts as sure enough" is itself an ethical and social judgment.`}, src:{ko:["헤더 더글러스","귀납적 위험"],en:["Heather Douglas","Inductive Risk"]}, eff:{values:-2}},
 {t:{ko:`객관성은 과학자 개인이 가치 중립을 추구한다고 생기는 게 아니다. 서로 다른 입장들이 비판적으로 부딪히는 과정에서 생긴다 — 가치를 없애는 게 아니라 다양하게 만드는 게 객관성의 조건이다.`,en:`Objectivity doesn't come from individual scientists striving to be value-neutral. It comes from different viewpoints clashing critically — not removing values, but having many of them, is what makes science objective.`}, src:{ko:["롱기노","맥락적 경험론"],en:["Longino","Contextual Empiricism"]}, eff:{values:-2,plurality:-1}},

/* ===================== SCORING ===================== */
function computeScores(){
  const raw={},max={}; AXIS_KEYS.forEach(k=>{raw[k]=0;max[k]=0;});
  Q.forEach((q,qi)=>{ const a=answers[qi]; if(a===null) return;
    for(const k in q.eff){ raw[k]+=a*q.eff[k]; max[k]+=Math.abs(q.eff[k])*2; } });
  return AXIS_KEYS.map(k=> max[k]? (raw[k]/max[k])*100 : 0 );
}
const MAXD=Math.sqrt(AXIS_KEYS.length*200*200);
function dist(a,b){let d=0;for(let i=0;i<a.length;i++){const x=a[i]-b[i];d+=x*x;}return Math.sqrt(d);}
function sim(a,b){return Math.max(0,Math.round((1-dist(a,b)/MAXD)*100));}
function profileFromUV(uv){
  const school=[...SCHOOLS].map(x=>({...x,sm:sim(uv,x.v)})).sort((a,b)=>b.sm-a.sm)[0];
  const top3=[...PHIL].map(x=>({...x,sm:sim(uv,x.v)})).sort((a,b)=>b.sm-a.sm).slice(0,3);
  return {school,top3};
}

/* ===================== SHARE LINK ===================== */
function buildShareURL(uv){ return location.href.split('#')[0]+'#r='+uv.map(x=>Math.round(x)).join('_'); }
function parseShare(){
  const m=location.hash.match(/r=(-?\d+(?:_-?\d+)*)/);
  if(!m) return null;
  const parts=m[1].split('_').map(Number);
  if(parts.length!==AXIS_KEYS.length||parts.some(isNaN)) return null;
  return parts.map(n=>Math.max(-100,Math.min(100,n)));
}

        <div class="rank">${i+1}</div>

        <div class="blurb">${tx(p.b)}</div></div></div>`;
  });

  if(fromShare){

    let app=`<details class="appendix reveal" style="animation-delay:.8s"><summary>${u('apxSummary')}</summary><div class="disc">${u('apxDisc')}</div>`;
    order.forEach(qi=>{
      const q=Q[qi],a=answers[qi]; let tag="ans-n",lab=u('likert')[2];
      if(a===2){tag="ans-a";lab=u('likert')[0];} else if(a===1){tag="ans-a";lab=u('likert')[1];}
      else if(a===-1){tag="ans-d";lab=u('likert')[3];} else if(a===-2){tag="ans-d";lab=u('likert')[4];}
      const sc=tx(q.src);
      app+=`<div class="src-item"><span class="ans ${tag}">${lab}</span><span class="q">${tx(q.t)}</span><span class="s">— ${sc[0]}${sc[1]&&sc[1]!=="—"?` · ${sc[1]}`:""}</span></div>`;
    });
    app+=`</details>`; h+=app;
  }

  const copyPayload={type:tx(school.name),fig:tx(school.fig),top:top3.map(p=>tx(p.n)+" "+p.sm+"%")};
  let act=`<div class="reveal actions" style="animation-delay:.85s">`;
  if(!fromShare) act+=`<button class="btn ochre" onclick='copySummary(${JSON.stringify(copyPayload)})'>${u('copy')}</button>`;
  act+=`<button class="btn" onclick="copyLink()">${u('shareLink')}</button>`;
  act+=`<button class="btn ghost" onclick="saveImage()">${u('saveImage')}</button>`;
  act+= fromShare ? `<button class="btn ghost" onclick="goFresh()">${u('tryIt')}</button>`
                  : `<button class="btn ghost" onclick="goFresh()">${u('again')}</button>`;
  act+=`</div>`; h+=act;

  R.innerHTML=h;
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    document.querySelectorAll('.bar .neg,.bar .pos').forEach(el=>{el.style.width=el.dataset.w+"%";});
  }));
}

/* ===================== SHARE ACTIONS ===================== */
function copySummary(p){
  const txt=`${u('copyTitle')}\n${u('copyType')}: ${p.type} (${p.fig})\n${u('copyClose')}: ${p.top.join(', ')}\n#SciPhiScales`;
  clip(txt,u('copied'));
}
function copyLink(){ if(lastUV) clip(buildShareURL(lastUV),u('linkCopied')); }
function clip(text,okMsg){
  (navigator.clipboard?navigator.clipboard.writeText(text):Promise.reject())
    .then(()=>toast(okMsg))
    .catch(()=>{ try{ const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();toast(okMsg);}catch(e){toast(u('copyFail'));} });
}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1900);}

/* ===================== IMAGE CARD ===================== */
function wrapCanvas(g,text,maxW){
  const lines=[];
  if(text.indexOf(' ')>-1){
    let line='';
    text.split(' ').forEach(w=>{ const t=line?line+' '+w:w; if(g.measureText(t).width>maxW&&line){lines.push(line);line=w;} else line=t; });
    if(line) lines.push(line);
  } else {
    let line='';
    for(const ch of text){ const t=line+ch; if(g.measureText(t).width>maxW&&line){lines.push(line);line=ch;} else line=t; }
    if(line) lines.push(line);
  }
  return lines;
}
async function saveImage(){
  try{
    const uv=lastUV; if(!uv){toast(u('imgFail'));return;}
    if(document.fonts&&document.fonts.ready){ try{await document.fonts.ready;}catch(e){} }
    const {school,top3}=profileFromUV(uv);
    const W=1080,H=1080,c=document.createElement('canvas'); c.width=W;c.height=H;
    const g=c.getContext('2d');
    g.fillStyle='#f3ead7'; g.fillRect(0,0,W,H);
    g.strokeStyle='#c9b893'; g.lineWidth=3; g.strokeRect(38,38,W-76,H-76);
    g.textAlign='center';
    g.fillStyle='#b06a2c'; g.font='600 26px "Noto Serif KR", serif';
    g.fillText(u('kicker'), W/2, 128);
    g.fillStyle='#1c2434'; g.font='900 58px "Noto Serif KR", serif';
    const lines=wrapCanvas(g,tx(school.name),W-220);
    let ty=215; lines.forEach(l=>{g.fillText(l,W/2,ty); ty+=70;});
    g.fillStyle='#b06a2c'; g.font='italic 34px "Noto Serif KR", serif';
    g.fillText(tx(school.fig), W/2, ty+2); ty+=64;
    g.strokeStyle='#c9b893'; g.lineWidth=1.5; g.beginPath(); g.moveTo(160,ty); g.lineTo(W-160,ty); g.stroke();
    let by=ty+58; const bx=130, bw=W-260, rowH=56;
    AXIS_KEYS.forEach((k,i)=>{
      const a=AXES[k],sc=uv[i]; const pos=Math.max(0,sc)/100, neg=Math.max(0,-sc)/100;
      g.font='500 21px "Noto Sans KR", sans-serif';
      g.textAlign='left'; g.fillStyle='#8d2f3a'; g.fillText(tx(a.neg), bx, by-9);
      g.textAlign='right'; g.fillStyle='#3a417a'; g.fillText(tx(a.pos), bx+bw, by-9);
      g.fillStyle='#e7d9bb'; g.fillRect(bx,by,bw,15);
      g.fillStyle='#8d2f3a'; g.fillRect(bx,by,bw*neg,15);
      g.fillStyle='#3a417a'; g.fillRect(bx+bw-bw*pos,by,bw*pos,15);
      by+=rowH;
    });
    g.textAlign='center'; g.fillStyle='#1c2434'; g.font='600 30px "Noto Serif KR", serif';
    g.fillText(`${u('copyClose')} · ${tx(top3[0].n)} (${top3[0].sm}%)`, W/2, by+30);
    g.fillStyle='#41506b'; g.font='400 22px "Noto Serif KR", serif';
    g.fillText('SciPhiScales', W/2, H-66);
    c.toBlob(blob=>{
      if(!blob){toast(u('imgFail'));return;}
      const file=new File([blob],'sciphiscales.png',{type:'image/png'});
      if(navigator.canShare&&navigator.canShare({files:[file]})){
        navigator.share({files:[file],title:'SciPhiScales'}).then(()=>toast(u('imgSaved'))).catch(()=>downloadBlob(blob));
      } else downloadBlob(blob);
    },'image/png');
  }catch(e){ toast(u('imgFail')); }
}
function downloadBlob(blob){
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download='sciphiscales.png'; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000); toast(u('imgSaved'));
}

/* ===================== INIT ===================== */
updateToggle();
const shared=parseShare();
if(shared){ sharedUV=shared; screen='results'; renderResults(sharedUV); }
else { renderIntro(); }
document.getElementById('foot').innerHTML=u('foot');
</script>
